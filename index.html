<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Novel Writing Engine</title>
  <style>
    :root { --bg:#0b1220; --panel:#111a2b; --text:#e8eefc; --muted:#a7b4d1; --line:#2a3856; }
    *{box-sizing:border-box}
    body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:920px;margin:0 auto;padding:28px}
    .box{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:14px}
    h1,h2{margin:0 0 10px}
    p,li{color:var(--muted);line-height:1.5}
    code{color:#d6e4ff}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <h1>Novel Writing Engine</h1>
      <p>Local technical page. No ads, no external redirects.</p>
    </div>

    <div class="box">
      <h2>Components</h2>
      <ul>
        <li><code>agents/</code>: specialist agent definitions</li>
        <li><code>skills/</code>: orchestration flows</li>
        <li><code>.claude-plugin/</code>: plugin metadata</li>
      </ul>
    </div>

    <div class="box">
      <h2>Main Flow</h2>
      <p><code>/propose</code> → <code>/design-big</code> → <code>/design-small</code> → <code>/create</code> → <code>/polish</code> → <code>/rewrite</code></p>
    </div>
  </div>
</body>
</html>
